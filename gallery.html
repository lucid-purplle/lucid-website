<!-- Detail overlay — panel content is cloned in from each entry's <template> on open -->
<div class="gallery-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Image detail">
  <button class="gallery-overlay__close" type="button" aria-label="Close">×</button>
  <div class="gallery-overlay__panel"></div>
</div>

<script>
  /* Masonry — distribute .gallery-entry items into the shortest column.
     Column count is responsive (3 desktop / 2 at <=820px). Each entry's
     relative height comes from the thumbnail's intrinsic aspect ratio
     (width/height attributes), so placement is correct before the
     images finish loading. Re-runs only when the column count changes. */
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      var list = document.querySelector('.gallery-list');
      if (!list) return;
      var entries = Array.prototype.slice.call(
        list.querySelectorAll('.gallery-entry')
      );
      if (entries.length === 0) return;

      function columnCount() {
        return window.innerWidth <= 820 ? 2 : 3;
      }

      function aspectHeight(entry) {
        var img = entry.querySelector('.gallery-card img');
        var w = img && (img.getAttribute('width') || img.naturalWidth);
        var h = img && (img.getAttribute('height') || img.naturalHeight);
        return (w && h) ? (h / w) : 1;
      }

      var rendered = 0;
      function layout() {
        var n = columnCount();
        list.textContent = '';
        var cols = [];
        for (var i = 0; i < n; i++) {
          var col = document.createElement('div');
          col.className = 'gallery-col';
          list.appendChild(col);
          cols.push({ el: col, h: 0 });
        }
        entries.forEach(function (entry) {
          var shortest = cols[0];
          for (var j = 1; j < cols.length; j++) {
            if (cols[j].h < shortest.h) shortest = cols[j];
          }
          shortest.el.appendChild(entry);
          shortest.h += aspectHeight(entry);
        });
        rendered = n;
      }

      layout();
      var debounce;
      window.addEventListener('resize', function () {
        clearTimeout(debounce);
        debounce = setTimeout(function () {
          if (columnCount() !== rendered) layout();
        }, 150);
      });
    });
  })();

  /* Detail overlay — grid cells are thumbnail-only. Each .gallery-entry
     carries a <template> with its detail markup (large image, reference
     row, prompt + copy button, tags). Clicking a card clones that
     template into the single shared overlay panel.
     Close: close button, click outside the panel, or Escape. */
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      var overlay = document.querySelector('.gallery-overlay');
      if (!overlay) return;
      var panel = overlay.querySelector('.gallery-overlay__panel');
      var closeBtn = overlay.querySelector('.gallery-overlay__close');
      var cards = document.querySelectorAll('.gallery-card');
      var lastFocused = null;

      function openDetail(card) {
        var entry = card.closest('.gallery-entry');
        var tmpl = entry && entry.querySelector('.gallery-detail-tmpl');
        if (!tmpl) return;
        panel.innerHTML = '';
        panel.appendChild(tmpl.content.cloneNode(true));
        // Drop the reference row entirely if the entry has no references.
        var refs = panel.querySelector('.gallery-detail__refs');
        if (refs && refs.querySelectorAll('img').length === 0) refs.remove();
        lastFocused = document.activeElement;
        overlay.classList.add('gallery-overlay--open');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        overlay.scrollTop = 0;
        closeBtn.focus();
      }

      function closeDetail() {
        if (!overlay.classList.contains('gallery-overlay--open')) return;
        overlay.classList.remove('gallery-overlay--open');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        // Clear after the fade-out so content doesn't flash on next open.
        setTimeout(function () { panel.innerHTML = ''; }, 200);
        if (lastFocused && typeof lastFocused.focus === 'function') {
          lastFocused.focus();
        }
      }

      cards.forEach(function (card) {
        card.addEventListener('click', function () { openDetail(card); });
      });

      closeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        closeDetail();
      });

      overlay.addEventListener('click', function (e) {
        // Close when the click lands outside the panel (on the backdrop).
        if (!panel.contains(e.target)) closeDetail();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeDetail();
      });

      // Copy button — delegated, because panel content is cloned per open.
      function flashCopied(btn) {
        btn.classList.add('is-copied');
        btn.textContent = 'Copied';
        setTimeout(function () {
          btn.classList.remove('is-copied');
          btn.textContent = 'Copy';
        }, 2000);
      }
      function copyFallback(text) {
        // execCommand path for when the async Clipboard API is unavailable
        // or rejects (e.g. no transient activation).
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '0';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (err) { /* no-op */ }
        document.body.removeChild(ta);
      }
      panel.addEventListener('click', function (e) {
        var btn = e.target.closest('.gallery-copy');
        if (!btn) return;
        var promptEl = panel.querySelector('.gallery-prompt');
        if (!promptEl) return;
        var text = Array.prototype.map.call(
          promptEl.querySelectorAll('p'),
          function (p) { return p.innerText; }
        ).join('\n\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            function () { flashCopied(btn); },
            function () { copyFallback(text); flashCopied(btn); }
          );
        } else {
          copyFallback(text);
          flashCopied(btn);
        }
      });
    });
  })();
</script>
