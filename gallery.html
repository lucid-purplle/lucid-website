sharp, background softly layered. No bare paste-coated hands, no white seamless, no studio lighting, no harsh shadows, no sad expression, no dramatic backlighting, no saturated colours, no text in image.</p>

            <div class="gallery-prompt js-copy-text">
              <p>Studio product hero macro shot of the NYBae Velvet Mousse Lipstick tube — image 1 — a slim tall elegant liquid lipstick tube with a transparent clear plastic body letting the deep rich chocolate-brown velvet mousse shade inside show through, soft glossy clarity. The cap is a bright magenta-pink dome-shaped cap, smooth and rounded, slightly wider than the tube body. Slim tall cylindrical proportions, tapering subtly toward the base.</p>
              <p>Label details on the transparent body: "NYbae" written in white sloped script logo positioned in the upper-middle area of the tube, "Velvet Mousse Lipstick" in smaller white text stacked below the logo. All text in clean white printed on the transparent body, fully readable against the deep chocolate-brown mousse showing through behind, sharply rendered.</p>
              <p>Tube floating mid-air in a dynamic diagonal orientation tilted roughly thirty degrees from horizontal, pink dome cap pointing up toward the upper-left of the frame, doe-foot applicator tip end of the tube pointing down toward the lower-right, label fully readable, the entire tube clearly visible. Tube positioned in the centre of the frame, suspended weightlessly.</p>
              <p>A slow thick ribbon of rich chocolate-brown velvet mousse lipstick pours down vertically from above the top of the frame, the pour stream landing on the mid-body of the tube. At the contact point on the mid-body, the mousse pools and gathers in a thick sculptural mass with visible rounded folds, soft pillowy ridges and dimensional curves where the mousse piles against the tube body. From that pool, the mousse flows downward along the tube body in one continuous drip trail that travels down to the tip end of the tube. At the very tip / applicator nozzle of the tube, one single thick teardrop drip hangs off the end, stretched and elongated by gravity, ready to drop, with one small droplet falling away mid-air below it.</p>
              <p>The mousse coverage is moderate but controlled — pour stream from above, a sculptural pool at the contact point on the mid-body, a flowing drip trail tracing down the side of the tube, and one elegant teardrop hanging off the tip. The label, logo, and most of the cap remain visible. No cream cascading across the entire body, no multiple separate drips, just one natural flowing trail from the pour point to the tip.</p>
              <p>The mousse texture is thick, rich, and creamy — deep chocolate-brown velvet finish with a smooth glossy surface, dense pigmented consistency, holding its shape with soft rounded folds and a wet glossy sheen catching the light gently. Opaque and richly pigmented, looking luxurious and creamy.</p>
              <p>Light blush pink gradient background with soft luminance, seamless wash. Three translucent 3D pink glossy hearts floating in the negative space around the tube — one larger in the upper-right, two smaller scattered in the lower-left, varying sizes, not overlapping the tube or mousse. Soft diffused studio lighting from the upper-left at forty-five degrees, gentle soft shadow cast on the pink background behind the tube. Shot macro style with shallow depth of field, tube label, pour ribbon, mousse pool, flowing drip and hanging tip drip all in sharp focus. 100mm macro lens aesthetic. Clear transparent tube clarity, deep chocolate mousse inside the tube and dripping outside, glossy mousse texture and label clarity all rendered crisp and true-to-life. The tube must read as a slim tall transparent liquid lipstick tube with a pink dome cap — not opaque, not chunky, not short.</p>

<script>
  /* Brand filter — show only the selected brand's entries. Each
     aspect-ratio group hides itself when the filter leaves it empty. */
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      var select = document.getElementById('gallery-brand-filter');
      if (!select) return;
      var groups = Array.prototype.slice.call(
        document.querySelectorAll('.gallery-group')
      );
      select.addEventListener('change', function () {
        var v = select.value;
        groups.forEach(function (group) {
          var visible = 0;
          var entries = group.querySelectorAll('.gallery-entry');
          Array.prototype.forEach.call(entries, function (entry) {
            var match = v === 'all' ||
              entry.getAttribute('data-brand') === v;
            entry.style.display = match ? '' : 'none';
            if (match) visible += 1;
          });
          group.style.display = visible === 0 ? 'none' : '';
        });
      });
    });
  })();

  /* Detail overlay — grid cells are thumbnail-only. Each .gallery-entry
     carries a <template> with its detail markup (large image, reference
     row, prompt + copy button, tags). Clicking a card clones that
     template into the single shared overlay panel.
     Close: close button, click outside the panel, or Escape. */
  (function () {
    document.addEventListener('DOMContentLoaded', function () {
      var overlay = document.querySelector('.gallery-overlay');
      if (!overlay) return;
      var panel = overlay.querySelector('.gallery-overlay__panel');
      var closeBtn = overlay.querySelector('.gallery-overlay__close');
      var cards = document.querySelectorAll('.gallery-card');
      var lastFocused = null;

      function openDetail(card) {
        var entry = card.closest('.gallery-entry');
        var tmpl = entry && entry.querySelector('.gallery-detail-tmpl');
        if (!tmpl) return;
        panel.innerHTML = '';
        panel.appendChild(tmpl.content.cloneNode(true));
        // Drop the reference row entirely if the entry has no references.
        var refs = panel.querySelector('.gallery-detail__refs');
        if (refs && refs.querySelectorAll('img').length === 0) refs.remove();
        lastFocused = document.activeElement;
        overlay.classList.add('gallery-overlay--open');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        overlay.scrollTop = 0;
        closeBtn.focus();
      }

      function closeDetail() {
        if (!overlay.classList.contains('gallery-overlay--open')) return;
        overlay.classList.remove('gallery-overlay--open');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        // Clear after the fade-out so content doesn't flash on next open.
        setTimeout(function () { panel.innerHTML = ''; }, 200);
        if (lastFocused && typeof lastFocused.focus === 'function') {
          lastFocused.focus();
        }
      }

      cards.forEach(function (card) {
        card.addEventListener('click', function () { openDetail(card); });
      });

      closeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        closeDetail();
      });

      overlay.addEventListener('click', function (e) {
        // Close when the click lands outside the panel (on the backdrop).
        if (!panel.contains(e.target)) closeDetail();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeDetail();
      });
    });
  })();
</script>
